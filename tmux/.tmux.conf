
setw -g xterm-keys on
set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g prefix2 C-a                        # GNU-Screen compatible prefix
bind C-a send-prefix -2

set -q -g status-utf8 on                  # expect UTF-8 (tmux < 2.2)
setw -q -g utf8 on

set -g mouse on
set -g history-limit 50000                 # boost history

set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Pane splitting shortcuts
bind - split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# Pane navigation shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing shortcuts
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##########
# DESIGN #
##########
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',alacritty:RGB'

set-option -g status "on"

## COLORSCHEME: zenburn-dark
source-file "$HOME/.dotfiles/tmux/themes/zenburn-dark.tmux"

# Make the active session name large and obvious in the status bar.
# Overrides the generated theme's status-left.
set -g status-left-length 60
set -g status-left "#[bg=#7f9f7f,fg=#2b2b2b,bold] #S #[bg=#3f3f3f,fg=#7f9f7f] "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#f0dfaf,bold] #I:#W "

# Highlight windows that fired a bell (used by the Claude notify hook).
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other
set -g window-status-bell-style "bg=#cc9393,fg=#2b2b2b,bold"

# vim: set ft=tmux tw=0 nowrap:

set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'claude lazygit hx'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'

#-#-# start_of_ranger_tmux_config #-#-#
bind-key Bspace run-shell -b 'python3 -m ranger_tmux.drop'
#-#-# end_of_ranger_tmux_config #-#-#
